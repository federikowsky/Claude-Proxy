server:
  host: 127.0.0.1
  port: 8082
  log_level: info
  request_timeout_seconds: 120
  # Dev: validation detail logs, stream/complete start lines, and HTTP request/response body previews (logger llm_proxy.http_debug).
  debug: false
  # CORS — enable for browser-based clients (Open WebUI, custom dashboards).
  # cors:
  #   enabled: true
  #   allowed_origins:
  #     - "http://localhost:3000"
  #   allowed_methods: ["GET", "POST", "OPTIONS"]
  #   allowed_headers: ["*"]
  #   allow_credentials: false

routing:
  default_model: anthropic/claude-sonnet-4
  # Automatic fallback when primary model fails after all retries.
  # Set to null to disable. Must reference a configured model.
  fallback_model: anthropic/claude-sonnet-4

bridge:
  compatibility_mode: transparent    # transparent | compat | debug
  emit_usage: true
  # Anthropic/client extension fields accepted by the proxy at ingress.
  # Per-model stripping/adaptation happens later in the request_preparer.
  passthrough_request_fields:
    - output_config
  # Runtime orchestration control plane (session state machine, event log, tool lifecycle).
  # runtime_orchestration_enabled: false
  # runtime_policies:
  #   user_message_from_idle: executing       # planning | executing
  #   plan_exit_target: executing             # executing | completing
  #   user_rejected: planning                 # planning | paused | aborted
  #   permission_denied: paused               # paused | planning | aborted
  #   tool_failed: executing                  # executing | failed
  #   subtask_failed: orchestrating           # orchestrating | failed
  #   timeout_resolution: failed              # failed | interrupted
  #   interactive_input_repair: repair        # repair | forward_raw | strict
  #   text_control_attempt_policy: ignore     # ignore | warn | block
  # runtime_persistence:
  #   backend: sqlite                         # sqlite | memory
  #   sqlite_path: data/llm_proxy_runtime.db

providers:
  openrouter:
    enabled: true
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
    connect_timeout_seconds: 10
    read_timeout_seconds: 120
    write_timeout_seconds: 20
    pool_timeout_seconds: 10
    max_connections: 100
    max_keepalive_connections: 20
    app_name: llm-proxy
    app_url: null
    debug_echo_upstream_body: false
    # Retry on transient errors with exponential backoff.
    retry_attempts: 2              # 0 = no retries, max 10
    retry_backoff_base: 1.0        # seconds; delay = base * 2^attempt + jitter
    retry_on_status: [429, 502, 503, 529]
    # Extra HTTP headers sent with every request to this provider.
    # custom_headers:
    #   X-Custom-Header: "value"
    # Override OpenAI finish_reason -> Anthropic stop_reason mapping.
    # Default: {stop: end_turn, length: max_tokens, tool_calls: tool_use,
    #           content_filter: end_turn, function_call: tool_use}
    # finish_reason_map:
    #   stop: end_turn
    #   length: max_tokens

  anthropic:
    enabled: false
    base_url: https://api.anthropic.com/v1
    api_key_env: ANTHROPIC_API_KEY
    connect_timeout_seconds: 10
    read_timeout_seconds: 300
    write_timeout_seconds: 30
    pool_timeout_seconds: 10
    max_connections: 100
    max_keepalive_connections: 20
    anthropic_version: "2023-06-01"
    anthropic_beta: null           # e.g. "prompt-caching-2024-07-31"

  nvidia:
    enabled: false
    base_url: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_API_KEY
    connect_timeout_seconds: 10
    read_timeout_seconds: 300
    write_timeout_seconds: 30
    pool_timeout_seconds: 10
    max_connections: 100
    max_keepalive_connections: 20

  gemini:
    enabled: false
    base_url: https://generativelanguage.googleapis.com/v1beta/openai
    api_key_env: GEMINI_API_KEY
    connect_timeout_seconds: 10
    read_timeout_seconds: 300
    write_timeout_seconds: 30
    pool_timeout_seconds: 10
    max_connections: 100
    max_keepalive_connections: 20

  openai:
    enabled: false
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    connect_timeout_seconds: 10
    read_timeout_seconds: 300
    write_timeout_seconds: 30
    pool_timeout_seconds: 10
    max_connections: 100
    max_keepalive_connections: 20

models:
  anthropic/claude-sonnet-4:
    provider: openrouter
    enabled: true
    supports_stream: true
    supports_nonstream: true
    supports_tools: true
    supports_thinking: true
    thinking_passthrough_mode: full   # full | native_only | off
    # Alternative names that resolve to this model.
    # aliases:
    #   - sonnet
    #   - claude-sonnet

  openai/gpt-4.1-mini:
    provider: openrouter
    enabled: true
    supports_stream: true
    supports_nonstream: true
    supports_tools: true
    supports_thinking: true
    thinking_passthrough_mode: native_only

  # Example of per-model upstream request stripping for providers/models
  # that reject otherwise valid Anthropic passthrough fields.
  stepfun/step-3.5-flash:free:
    provider: openrouter
    enabled: false
    supports_stream: true
    supports_nonstream: true
    supports_tools: true
    supports_thinking: true
    thinking_passthrough_mode: off
    unsupported_request_fields:
      - output_config

  # Anthropic direct — requires anthropic provider enabled above
  claude-sonnet-4-20250514:
    provider: anthropic
    enabled: false
    supports_stream: true
    supports_nonstream: true
    supports_tools: true
    supports_thinking: true
    thinking_passthrough_mode: full

  # NVIDIA NIM direct — requires nvidia provider enabled above
  nvidia/llama-3.3-nemotron-super-49b-v1:
    provider: nvidia
    enabled: false
    supports_stream: true
    supports_nonstream: true
    supports_tools: true
    supports_thinking: false
    thinking_passthrough_mode: off

  # Gemini direct (OpenAI-compatible) — requires gemini provider enabled above
  gemini-2.5-flash:
    provider: gemini
    enabled: false
    supports_stream: true
    supports_nonstream: true
    supports_tools: true
    supports_thinking: false
    thinking_passthrough_mode: off

  # OpenAI direct — requires openai provider enabled above
  gpt-4.1:
    provider: openai
    enabled: false
    supports_stream: true
    supports_nonstream: true
    supports_tools: true
    supports_thinking: true
    thinking_passthrough_mode: native_only
    # Per-model thinking extraction — tags used to detect thinking in streamed text.
    # Set to null to disable tag-based extraction (e.g. models that never use think tags).
    # thinking_open_tag: "<think>"
    # thinking_close_tag: "</think>"
    # Response delta field names checked for structured reasoning content.
    # thinking_extraction_fields:
    #   - reasoning_content
    #   - reasoning

  o3:
    provider: openai
    enabled: false
    supports_stream: true
    supports_nonstream: true
    supports_tools: true
    supports_thinking: true
    thinking_passthrough_mode: native_only

  o4-mini:
    provider: openai
    enabled: false
    supports_stream: true
    supports_nonstream: true
    supports_tools: true
    supports_thinking: true
    thinking_passthrough_mode: native_only

  # Example: model with custom thinking tags (e.g. DeepSeek R1 uses <reasoning>)
  # deepseek/deepseek-r1:
  #   provider: openrouter
  #   enabled: false
  #   supports_stream: true
  #   supports_nonstream: true
  #   supports_tools: true
  #   supports_thinking: true
  #   thinking_passthrough_mode: full
  #   thinking_open_tag: "<reasoning>"
  #   thinking_close_tag: "</reasoning>"
  #   thinking_extraction_fields:
  #     - reasoning_content
